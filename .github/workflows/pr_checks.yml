name: PR Quality Checks

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'packages/frontend/**'
              - 'packages/contracts/**' # Frontend depends on contracts
            backend:
              - 'packages/backend/**'
              - 'packages/contracts/**' # Backend depends on contracts

  frontend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # This generates the /dist folders and .d.ts files in shared packages
      # so that vue-tsc can find the types for 'contracts'
      - name: Build Shared Workspaces
        run: npm run build --workspaces --if-present

      - name: Frontend Quality Checks
        working-directory: ./packages/frontend
        run: |
          npm run type-check
          npm run test:unit
          npm run lint
          npm run build

  backend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Shared Workspaces
        run: npm run build --workspaces --if-present

      - name: Backend Quality Checks
        working-directory: ./packages/backend
        run: |
          npm run test:all
          npm run types:lint
          npm run build
